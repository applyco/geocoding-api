name: ETL Pipeline

on:
  push:
    paths:
      - "etl/data/overrides.yaml"
      - ".github/workflows/etl.yml"
  schedule:
    # Every Monday at 02:00 UTC - pick up upstream data updates from Natural Earth/GeoNames
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  etl:
    name: Run ETL Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            etl/package-lock.json
            worker/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin

      - name: Install ETL dependencies
        run: |
          cd etl
          npm install

      - name: Run ETL Pipeline
        env:
          ES_URL: ${{ secrets.ES_URL }}
          ES_API_KEY: ${{ secrets.ES_API_KEY }}
        run: |
          cd etl
          npm run etl

      - name: Report results
        if: always()
        run: |
          echo "ETL Pipeline completed"
          if [ -d "etl/data/processed" ]; then
            ls -lh etl/data/processed/
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "ETL Pipeline failed",
              body: `ETL pipeline failed on ${context.ref}. Check [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
              labels: ["bug", "etl"]
            })
